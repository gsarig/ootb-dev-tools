name: Copilot CR Auto-Fix

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    if: >-
      github.event.review.user.login == 'Copilot' &&
      github.event.review.user.type == 'Bot' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login == 'gsarig' &&
      github.event.pull_request.base.ref != 'master' &&
      github.event.pull_request.base.ref != 'main' &&
      contains(github.event.pull_request.labels.*.name, 'ai-fix')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Evaluate and fix (no test suite in this repo) ──
      - name: Evaluate and fix
        id: main
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            'use strict';
            const fs = require('fs');
            const path = require('path');
            const { spawnSync } = require('child_process');

            const ws       = process.env.GITHUB_WORKSPACE;
            const owner    = context.repo.owner;
            const repo     = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const reviewId = context.payload.review.id;

            function run(cmd, args) {
              const r = spawnSync(cmd, args, { cwd: ws, encoding: 'utf8' });
              return { ok: r.status === 0 && !r.error, output: [r.stdout||'', r.stderr||''].join('\n').trim() };
            }

            function applyFixes(commits, changedPaths) {
              const written = [];
              for (const { path: fp, content } of commits) {
                if (!changedPaths.has(fp)) { core.warning(`Skipping ${fp}: not in PR diff`); continue; }
                const resolved = path.resolve(ws, fp);
                if (!resolved.startsWith(ws + path.sep)) { core.warning(`Refusing to write outside workspace: ${fp}`); continue; }
                fs.mkdirSync(path.dirname(resolved), { recursive: true });
                fs.writeFileSync(resolved, content, 'utf8');
                written.push(fp);
              }
              return written;
            }

            async function callClaude(userMsgObj) {
              const apiRes = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'x-api-key': process.env.ANTHROPIC_API_KEY,
                  'anthropic-version': '2023-06-01',
                },
                body: JSON.stringify({
                  model: 'claude-sonnet-4-6',
                  max_tokens: 8192,
                  system: `You are a code fix agent. You have been given Copilot code review comments on a pull request.
            Evaluate each comment and either apply the fix or explain why you are skipping it.
            You must reply to every comment.
            Respond with valid JSON only:
            { "commits": [{ "path": "...", "content": "..." }], "replies": [{ "comment_id": 123, "body": "..." }], "summary": "..." }`,
                  messages: [{ role: 'user', content: JSON.stringify(userMsgObj) }],
                }),
              });
              if (!apiRes.ok) throw new Error(`Anthropic API error ${apiRes.status}: ${await apiRes.text()}`);
              const data = await apiRes.json();
              const raw = data.content[0].text;
              let result;
              try { result = JSON.parse(raw); }
              catch (_) {
                const m = raw.match(/\{[\s\S]*\}/);
                if (m) result = JSON.parse(m[0]);
                else throw new Error(`Could not parse API response:\n${raw}`);
              }
              const { commits = [], replies = [], summary: s = '(no summary)' } = result;
              return { commits, replies, summary: s.slice(0, 2000) };
            }

            try {
              const allComments = await github.paginate(
                github.rest.pulls.listReviewComments,
                { owner, repo, pull_number: prNumber, per_page: 100 }
              );
              const comments = allComments.filter(c => c.pull_request_review_id === reviewId);

              if (comments.length === 0) {
                core.info('No review comments found for this Copilot review. Exiting.');
                return;
              }

              const prFiles = await github.paginate(
                github.rest.pulls.listFiles,
                { owner, repo, pull_number: prNumber, per_page: 100 }
              );
              const changedPaths = new Set(prFiles.map(f => f.filename));

              const files = [];
              for (const fp of [...new Set(comments.map(c => c.path))]) {
                if (!changedPaths.has(fp)) continue;
                try { files.push({ path: fp, content: fs.readFileSync(path.join(ws, fp), 'utf8') }); }
                catch (e) { core.warning(`Could not read ${fp}: ${e.message}`); }
              }

              core.info('Calling Anthropic API...');
              const { commits, replies, summary } = await callClaude({
                pr_number: prNumber,
                comments: comments.map(c => ({ id: c.id, path: c.path, line: c.line ?? c.original_line, body: c.body, diff_hunk: c.diff_hunk })),
                files,
              });

              const writtenFiles = applyFixes(commits, changedPaths);
              core.info(`Files written: ${writtenFiles.length}`);

              // Commit and push if any files were changed
              if (writtenFiles.length > 0) {
                for (const fp of writtenFiles) run('git', ['add', fp]);
                const msgFile = path.join(ws, '.git', '_copilot_fix_msg');
                fs.writeFileSync(msgFile, `fixup: apply Copilot CR suggestions\n\n${summary}`);
                const commitR = run('git', ['commit', '-F', msgFile]);
                if (!commitR.ok) throw new Error(`git commit failed: ${commitR.output}`);
                const pushR = run('git', ['push']);
                if (!pushR.ok) core.error(`git push failed: ${pushR.output}`);
              } else {
                core.info('No file changes — skipping commit.');
              }

              // Post replies
              for (const { comment_id, body } of replies) {
                try {
                  await github.rest.pulls.createReplyForReviewComment({ owner, repo, pull_number: prNumber, comment_id, body });
                } catch (e) { core.warning(`Reply failed for ${comment_id}: ${e.message}`); }
              }

              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: `🤖 **Copilot CR Auto-Fix**\n\n${summary}\n\nSee individual comment replies for details.`,
              });

            } catch (error) {
              run('git', ['restore', '.']);
              core.error(error.message);
              throw error;
            }

      - name: Handle unexpected failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `🤖 **Copilot CR Auto-Fix** encountered an error. Check the [workflow run](${runUrl}) for details.`,
              });
            } catch (_) {}
