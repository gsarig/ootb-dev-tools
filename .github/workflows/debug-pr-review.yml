name: Debug PR Review Event

on:
  pull_request_review:
    types: [submitted]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Dump event payload
        run: |
          echo "=== review.user.login ==="
          echo '${{ github.event.review.user.login }}'
          echo "=== review.user.type ==="
          echo '${{ github.event.review.user.type }}'
          echo "=== pull_request.draft ==="
          echo '${{ github.event.pull_request.draft }}'
          echo "=== pull_request.user.login ==="
          echo '${{ github.event.pull_request.user.login }}'
          echo "=== pull_request.base.ref ==="
          echo '${{ github.event.pull_request.base.ref }}'
          echo "=== pull_request.labels ==="
          echo '${{ toJSON(github.event.pull_request.labels) }}'
          echo "=== full condition evaluation ==="
          echo "login match: ${{ github.event.review.user.login == 'copilot-pull-request-reviewer[bot]' }}"
          echo "not draft: ${{ github.event.pull_request.draft == false }}"
          echo "author match: ${{ github.event.pull_request.user.login == 'gsarig' }}"
          echo "not master: ${{ github.event.pull_request.base.ref != 'master' }}"
          echo "not main: ${{ github.event.pull_request.base.ref != 'main' }}"
          echo "has ai-fix label: ${{ contains(github.event.pull_request.labels.*.name, 'ai-fix') }}"
